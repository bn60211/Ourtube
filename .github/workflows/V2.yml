name: YouTube Advanced Downloader

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Enter YouTube Video/Playlist/Channel URL'
        required: true
        type: string

jobs:
  download-and-split:
    runs-on: ubuntu-latest

    steps:
    # 1. گرفتن کدهای ریپازیتوری
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. نصب ابزار ffmpeg و ابزار zip/split
    - name: Install FFmpeg and Zip Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg zip

    # 3. نصب آخرین نسخه yt-dlp
    - name: Install yt-dlp
      run: |
        sudo wget https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -O /usr/local/bin/yt-dlp
        sudo chmod a+rx /usr/local/bin/yt-dlp

    # 4. ساخت پوشه موقت و دانلود با بالاترین کیفیت ممکن (تا سقف 1440p یا بالاتر)
    - name: Download Video
      run: |
        mkdir -p downloads
        yt-dlp -f "bestvideo+bestaudio/best" --merge-output-format mp4 -o "downloads/%(title)s.%(ext)s" "${{ github.event.inputs.video_url }}"

    # 5. پارت‌بندی کردن فایل‌ها به تکه‌های ۴۵ مگابایتی
    # از ابزار استاندارد linux split استفاده شده تا فایل بدون خرابی تکه تکه شود
    - name: Split Files into 45MB Parts
      run: |
        mkdir -p ready_parts
        cd downloads
        for file in *; do
          if [ -f "$file" ]; then
            # تقسیم به پارت‌های 45 مگابایتی با پسوندهای قسمتی (مانند .mp4.part_aa)
            split -b 45M "$file" "../ready_parts/${file}.part_"
          fi
        done

    # 6. ذخیره پارت‌ها به عنوان Artifact (جایگزین امن برای Git Push)
    - name: Upload Parts as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: youtube-split-videos
        path: ready_parts/
        retention-days: 5

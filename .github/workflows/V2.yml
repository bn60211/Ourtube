name: YouTube Smart AV1 Downloader

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Enter YouTube Video/Playlist/Channel URL'
        required: true
        type: string
      video_quality:
        description: 'Select Video Quality (AV1 Preferred)'
        required: true
        type: choice
        default: '1080p'
        options:
          - '1440p'
          - '1080p'
          - '720p'
          - '480p'

jobs:
  download-and-split:
    runs-on: ubuntu-latest

    steps:
    # 1. گرفتن کدهای ریپازیتوری
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. نصب ابزار ffmpeg و ابزار zip
    - name: Install FFmpeg and Zip Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg zip

    # 3. نصب آخرین نسخه yt-dlp
    - name: Install yt-dlp
      run: |
        sudo wget https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -O /usr/local/bin/yt-dlp
        sudo chmod a+rx /usr/local/bin/yt-dlp

    # 4. دانلود ویدیو (اولویت اول AV1، در غیر این صورت بهترین کیفیت بعدی)
    - name: Download Video
      run: |
        mkdir -p downloads
        
        # تعیین رزولوشن بر اساس انتخاب کاربر
        if [ "${{ github.event.inputs.video_quality }}" = "1440p" ]; then
          HEIGHT="1440"
        elif [ "${{ github.event.inputs.video_quality }}" = "1080p" ]; then
          HEIGHT="1080"
        elif [ "${{ github.event.inputs.video_quality }}" = "720p" ]; then
          HEIGHT="720"
        else
          HEIGHT="480"
        fi
        
        # فرمول اولویت‌بندی: ابتدا AV1 با رزولوشن انتخابی، سپس هر کدک دیگری در آن رزولوشن
        yt-dlp -f "bestvideo[height<=$HEIGHT][vcodec^=av01]+bestaudio/bestvideo[height<=$HEIGHT]+bestaudio/best" --merge-output-format mp4 -o "downloads/%(title)s.%(ext)s" "${{ github.event.inputs.video_url }}"

    # 5. پارت‌بندی کردن فایل‌ها به تکه‌های ۴۵ مگابایتی
    - name: Split Files into 45MB Parts
      run: |
        mkdir -p ready_parts
        cd downloads
        for file in *; do
          if [ -f "$file" ]; then
            split -b 45M "$file" "../ready_parts/${file}.part_"
          fi
        done

    # 6. ذخیره پارت‌ها به عنوان Artifact
    - name: Upload Parts as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: youtube-split-videos
        path: ready_parts/
        retention-days: 5
